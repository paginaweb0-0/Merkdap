<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MercadosApp — Panel de mercader</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
  <style>
    /* ═══════════════════════════════════════════════════════════════
       RESET Y VARIABLES — Mismo estilo pastel
       ═══════════════════════════════════════════════════════════════ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f2f6fc;
      --bg-card: #ffffff;
      --bg-glass: rgba(255, 255, 255, 0.65);
      --primary: #1a73e8;
      --primary-light: #4a9eff;
      --primary-dark: #0d47a1;
      --primary-soft: #e3f0ff;
      --secondary: #5b7fa5;
      --text: #1a2b3e;
      --text-light: #5b7fa5;
      --text-muted: #8aa3c0;
      --border: #dce6f0;
      --shadow: 0 4px 24px rgba(26, 115, 232, 0.08);
      --shadow-hover: 0 8px 40px rgba(26, 115, 232, 0.12);
      --radius: 16px;
      --radius-sm: 10px;
      --radius-full: 9999px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--primary-light);
      border-radius: 10px;
    }

    /* ── NAV ── */
    nav {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 12px rgba(0, 0, 0, 0.04);
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
    }
    .logo span {
      color: var(--primary);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .nav-links a {
      color: var(--text-light);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 8px 18px;
      border-radius: var(--radius-full);
      transition: var(--transition);
      cursor: pointer;
    }
    .nav-links a:hover {
      color: var(--primary);
      background: var(--primary-soft);
    }
    .nav-links .btn-salir {
      background: var(--bg);
      border: 1.5px solid var(--border);
      color: var(--text-light);
      padding: 8px 20px;
      border-radius: var(--radius-full);
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
      font-size: 14px;
    }
    .nav-links .btn-salir:hover {
      border-color: #ef4444;
      color: #ef4444;
      background: #fef2f2;
    }

    .usuario-info {
      font-size: 14px;
      color: var(--text-light);
      padding: 6px 16px;
      background: var(--primary-soft);
      border-radius: var(--radius-full);
    }
    .usuario-info strong {
      color: var(--primary);
    }

    /* ── LOGIN ── */
    .login-container {
      max-width: 400px;
      margin: 60px auto;
      background: white;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 40px;
      box-shadow: var(--shadow);
    }
    .login-container h1 {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      margin-bottom: 4px;
    }
    .login-container .sub {
      font-size: 14px;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 28px;
    }
    .login-container label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-light);
      margin-bottom: 4px;
    }
    .login-container input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      outline: none;
      margin-bottom: 16px;
      transition: var(--transition);
      font-family: inherit;
    }
    .login-container input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.08);
    }
    .login-container .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
      box-shadow: 0 2px 16px rgba(26, 115, 232, 0.2);
    }
    .login-container .btn-login:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(26, 115, 232, 0.3);
    }
    .login-container .volver {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .login-container .volver a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }
    .login-container .volver a:hover {
      text-decoration: underline;
    }
    .login-container .alerta {
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .login-container .alerta.error {
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
      display: block;
    }

    /* ── PANEL ── */
    .panel {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 22px;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 24px;
    }
    .panel-header h2 {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
    }
    .panel-header .sub {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 400;
    }
    .panel-header .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .panel-header .btn {
      padding: 10px 24px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
    }
    .panel-header .btn-primary {
      background: var(--primary);
      color: white;
      box-shadow: 0 2px 12px rgba(26, 115, 232, 0.2);
    }
    .panel-header .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(26, 115, 232, 0.3);
    }
    .panel-header .btn-accent {
      background: #f59e0b;
      color: white;
      box-shadow: 0 2px 12px rgba(245, 158, 11, 0.2);
    }
    .panel-header .btn-accent:hover {
      background: #d97706;
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(245, 158, 11, 0.3);
    }

    /* ── TABLA ── */
    .tabla-wrap {
      background: white;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    thead {
      background: var(--bg);
    }
    th {
      text-align: left;
      padding: 14px 18px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 14px 18px;
      border-top: 1px solid var(--border);
      vertical-align: middle;
    }
    tr:hover td {
      background: var(--bg);
    }

    .precio-col {
      font-weight: 700;
      color: var(--primary);
    }
    .badge {
      display: inline-block;
      padding: 2px 12px;
      border-radius: var(--radius-full);
      font-size: 11px;
      font-weight: 600;
    }
    .badge-cat {
      background: var(--primary-soft);
      color: var(--primary);
    }
    .badge-oferta {
      background: #fef3c7;
      color: #92400e;
    }

    .acciones {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .acciones .btn-edit {
      padding: 4px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--text-light);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
    }
    .acciones .btn-edit:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-soft);
    }
    .acciones .btn-delete {
      padding: 4px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
    }
    .acciones .btn-delete:hover {
      border-color: #ef4444;
      color: #ef4444;
      background: #fef2f2;
    }

    .vacio {
      text-align: center;
      padding: 50px 20px;
      color: var(--text-muted);
    }
    .vacio .icono {
      font-size: 40px;
      display: block;
      margin-bottom: 10px;
      opacity: 0.4;
    }
    .vacio h4 {
      font-size: 16px;
      color: var(--text);
      margin-bottom: 4px;
    }
    .vacio p {
      font-size: 14px;
    }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(8px);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.active {
      display: flex;
    }
    .modal-content {
      background: white;
      border-radius: var(--radius);
      padding: 32px;
      max-width: 460px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
      animation: fadeUp 0.3s ease forwards;
    }
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .modal-content h2 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
      color: var(--text);
    }
    .modal-content label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-light);
      margin-bottom: 4px;
    }
    .modal-content input,
    .modal-content select,
    .modal-content textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      outline: none;
      margin-bottom: 14px;
      font-family: inherit;
      transition: var(--transition);
    }
    .modal-content input:focus,
    .modal-content select:focus,
    .modal-content textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.08);
    }
    .modal-content textarea {
      resize: vertical;
      min-height: 60px;
    }
    .modal-botones {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }
    .modal-botones button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
    }
    .modal-botones .btn-cancel {
      background: var(--bg);
      color: var(--text-light);
      border: 1.5px solid var(--border);
    }
    .modal-botones .btn-cancel:hover {
      background: var(--border);
    }
    .modal-botones .btn-save {
      background: var(--primary);
      color: white;
      box-shadow: 0 2px 12px rgba(26, 115, 232, 0.2);
    }
    .modal-botones .btn-save:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
    }
    .modal-botones .btn-save-accent {
      background: #f59e0b;
      color: white;
      box-shadow: 0 2px 12px rgba(245, 158, 11, 0.2);
    }
    .modal-botones .btn-save-accent:hover {
      background: #d97706;
      transform: translateY(-2px);
    }

    .modal-close {
      float: right;
      background: none;
      border: none;
      font-size: 20px;
      color: var(--text-muted);
      cursor: pointer;
      transition: var(--transition);
    }
    .modal-close:hover {
      color: var(--text);
      transform: rotate(90deg);
    }

    /* ── TOAST ── */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 300;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: flex-end;
      pointer-events: none;
    }
    .toast {
      background: white;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 14px 24px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      max-width: 360px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      display: flex;
      align-items: center;
      gap: 10px;
      animation: toastIn 0.4s ease forwards;
      pointer-events: auto;
    }
    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    .toast.success {
      border-color: #10b981;
    }
    .toast.error {
      border-color: #ef4444;
    }
    .toast-icon {
      font-size: 18px;
      flex-shrink: 0;
    }
    .toast-dismiss {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 16px;
      cursor: pointer;
      margin-left: 8px;
      padding: 0;
      line-height: 1;
      transition: var(--transition);
      font-family: inherit;
    }
    .toast-dismiss:hover {
      color: var(--text);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      nav {
        height: auto;
        padding: 12px 16px;
        flex-direction: column;
        gap: 8px;
      }
      .panel-header {
        flex-direction: column;
        align-items: stretch;
      }
      .panel-header .actions {
        flex-direction: column;
      }
      .panel-header .btn {
        width: 100%;
        text-align: center;
      }
      .acciones {
        flex-direction: column;
      }
      .acciones button {
        width: 100%;
      }
      .login-container {
        margin: 30px 16px;
        padding: 28px 20px;
      }
    }
  </style>
</head>
<body>

  <!-- ─── NAV ──────────────────────────────────────────────── -->
  <nav>
    <div class="logo" onclick="window.location.href='index.html'">Mercados<span>App</span></div>
    <div class="nav-links">
      <a href="index.html">Inicio</a>
      <span class="usuario-info" id="usuarioInfo" style="display:none;">👤 <strong id="nombreUsuario"></strong></span>
      <button class="btn-salir" id="btnSalir" onclick="cerrarSesion()" style="display:none;">Cerrar sesión</button>
    </div>
  </nav>

  <!-- ─── LOGIN ──────────────────────────────────────────────── -->
  <div id="loginSection" class="login-container">
    <h1>Panel de mercader</h1>
    <p class="sub">Ingresa con tu correo y contraseña</p>
    <div id="alertaLogin" class="alerta"></div>
    <label>Correo electrónico</label>
    <input type="email" id="loginEmail" placeholder="tu@correo.com" />
    <label>Contraseña</label>
    <input type="password" id="loginPass" placeholder="Tu contraseña" />
    <button class="btn-login" onclick="iniciarSesion()">Ingresar</button>
    <div class="volver">
      <a href="index.html">← Volver a buscar precios</a>
    </div>
  </div>

  <!-- ─── PANEL ────────────────────────────────────────────────── -->
  <div id="panelSection" style="display:none;">
    <div class="panel">
      <div class="panel-header">
        <h2>Mi mercado <span class="sub" id="mercadoNombre"></span></h2>
        <div class="actions">
          <button class="btn btn-primary" onclick="abrirFormProducto()">+ Agregar producto</button>
          <button class="btn btn-accent" onclick="abrirFormOferta()">Crear oferta</button>
        </div>
      </div>

      <div class="tabla-wrap">
        <table>
          <thead>
            <tr>
              <th>Producto</th>
              <th>Categoría</th>
              <th>Precio</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaProductos">
            <tr>
              <td colspan="4">
                <div class="vacio">
                  <span class="icono">📦</span>
                  <h4>No tienes productos aún</h4>
                  <p>Agrega tu primer producto usando el botón superior</p>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ─── MODAL PRODUCTO ──────────────────────────────────────── -->
  <div class="modal-overlay" id="modalProducto">
    <div class="modal-content">
      <button class="modal-close" onclick="cerrarModal('modalProducto')">✕</button>
      <h2 id="modalProductoTitulo">Agregar producto</h2>
      <input type="hidden" id="prodId" />
      <label>Nombre del producto *</label>
      <input type="text" id="prodNombre" placeholder="Ej: Tomate chonto" />
      <label>Categoría *</label>
      <select id="prodCategoria">
        <option value="Frutas">Frutas</option>
        <option value="Verduras" selected>Verduras</option>
        <option value="Carnes">Carnes</option>
        <option value="Lácteos">Lácteos</option>
        <option value="Granos">Granos</option>
        <option value="Bebidas">Bebidas</option>
        <option value="Otros">Otros</option>
      </select>
      <label>Precio *</label>
      <input type="number" id="prodPrecio" placeholder="0" min="0" step="0.01" />
      <label>Unidad de medida *</label>
      <select id="prodUnidad">
        <option value="kg">kg (kilogramo)</option>
        <option value="gr">gr (gramo)</option>
        <option value="litro">litro</option>
        <option value="unidad">unidad</option>
        <option value="docena">docena</option>
        <option value="bolsa">bolsa</option>
        <option value="libra">libra</option>
      </select>
      <label>Emoji (opcional)</label>
      <input type="text" id="prodEmoji" placeholder="🍅" maxlength="4" />
      <div class="modal-botones">
        <button class="btn-cancel" onclick="cerrarModal('modalProducto')">Cancelar</button>
        <button class="btn-save" onclick="guardarProducto()">Guardar</button>
      </div>
    </div>
  </div>

  <!-- ─── MODAL OFERTA ────────────────────────────────────────── -->
  <div class="modal-overlay" id="modalOferta">
    <div class="modal-content">
      <button class="modal-close" onclick="cerrarModal('modalOferta')">✕</button>
      <h2>Crear oferta</h2>
      <label>Producto *</label>
      <select id="ofertaProducto"></select>
      <label>Precio de oferta * (menor al precio base)</label>
      <input type="number" id="ofertaPrecio" placeholder="0" min="0" step="0.01" />
      <label>Descripción de la oferta *</label>
      <input type="text" id="ofertaDesc" placeholder='Ej: "2x1", "20% descuento"' />
      <div class="modal-botones">
        <button class="btn-cancel" onclick="cerrarModal('modalOferta')">Cancelar</button>
        <button class="btn-save-accent" onclick="guardarOferta()">Crear oferta</button>
      </div>
    </div>
  </div>

  <!-- ─── TOAST ────────────────────────────────────────────────── -->
  <div class="toast-container" id="toastContainer"></div>

  <script>
    // ═══════════════════════════════════════════════════════════════════
    //  DATOS
    // ═══════════════════════════════════════════════════════════════════

    function getMercados() { return JSON.parse(localStorage.getItem('mapp_mercados') || '[]'); }

    function getProductos() { return JSON.parse(localStorage.getItem('mapp_productos') || '[]').filter(p => p.activo !==
        false); }

    function getUsuarios() { return JSON.parse(localStorage.getItem('mapp_usuarios') || '[]'); }

    function guardarUsuarios(u) { localStorage.setItem('mapp_usuarios', JSON.stringify(u)); }

    function guardarProductos(p) { localStorage.setItem('mapp_productos', JSON.stringify(p)); }

    function guardarMercados(m) { localStorage.setItem('mapp_mercados', JSON.stringify(m)); }

    function getSesion() { return JSON.parse(localStorage.getItem('mapp_sesion_mercader') || 'null'); }

    function guardarSesion(u) { localStorage.setItem('mapp_sesion_mercader', JSON.stringify(u)); }

    function eliminarSesion() { localStorage.removeItem('mapp_sesion_mercader'); }

    // ═══════════════════════════════════════════════════════════════════
    //  TOAST
    // ═══════════════════════════════════════════════════════════════════

    function toast(msg, type = 'info') {
      const container = document.getElementById('toastContainer');
      const icons = { info: '✦', success: '✓', error: '✕', warning: '⚠' };
      const div = document.createElement('div');
      div.className = 'toast ' + (type !== 'info' ? type : '');
      div.innerHTML = `
          <span class="toast-icon">${icons[type] || '✦'}</span>
          <span style="flex:1">${msg}</span>
          <button class="toast-dismiss" onclick="this.parentElement.remove()">✕</button>
        `;
      container.appendChild(div);
      setTimeout(() => div.remove(), 3800);
    }

    // ═══════════════════════════════════════════════════════════════════
    //  LOGIN
    // ═══════════════════════════════════════════════════════════════════

    function mostrarAlerta(msg) {
      const el = document.getElementById('alertaLogin');
      el.textContent = msg;
      el.className = 'alerta error';
    }

    function iniciarSesion() {
      const email = document.getElementById('loginEmail').value.trim();
      const pass = document.getElementById('loginPass').value;

      if (!email || !pass) {
        mostrarAlerta('Completa todos los campos');
        return;
      }

      const usuarios = getUsuarios();
      const usuario = usuarios.find(u => u.email === email && u.password === pass);

      if (!usuario) {
        mostrarAlerta('Correo o contraseña incorrectos');
        return;
      }

      guardarSesion(usuario);
      mostrarPanel();
      toast('Bienvenido ' + usuario.nombre, 'success');
    }

    document.getElementById('loginPass').addEventListener('keypress', e => {
      if (e.key === 'Enter') iniciarSesion();
    });

    // ═══════════════════════════════════════════════════════════════════
    //  PANEL
    // ═══════════════════════════════════════════════════════════════════

    function mostrarPanel() {
      const sesion = getSesion();
      if (!sesion) return;

      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('panelSection').style.display = 'block';
      document.getElementById('usuarioInfo').style.display = 'inline';
      document.getElementById('nombreUsuario').textContent = sesion.nombre;
      document.getElementById('btnSalir').style.display = 'inline-block';

      const mercados = getMercados();
      const miMercado = mercados.find(m => m.id === sesion.mercadoId);
      document.getElementById('mercadoNombre').textContent = miMercado ? '— ' + miMercado.nombre : '';

      renderTabla();
    }

    function cerrarSesion() {
      eliminarSesion();
      document.getElementById('loginSection').style.display = 'block';
      document.getElementById('panelSection').style.display = 'none';
      document.getElementById('usuarioInfo').style.display = 'none';
      document.getElementById('btnSalir').style.display = 'none';
      document.getElementById('loginEmail').value = '';
      document.getElementById('loginPass').value = '';
      document.getElementById('alertaLogin').className = 'alerta';
      toast('Sesión cerrada');
    }

    function renderTabla() {
      const sesion = getSesion();
      if (!sesion) return;

      const productos = getProductos().filter(p => p.mercadoId === sesion.mercadoId);
      const tbody = document.getElementById('tablaProductos');

      if (productos.length === 0) {
        tbody.innerHTML = `
            <tr><td colspan="4">
              <div class="vacio">
                <span class="icono">📦</span>
                <h4>No tienes productos aún</h4>
                <p>Agrega tu primer producto usando el botón superior</p>
              </div>
            </td></tr>
          `;
        return;
      }

      tbody.innerHTML = productos.map(p => `
          <tr>
            <td><strong>${p.nombre}</strong><br><span style="color:var(--text-muted);font-size:12px;">${p.unidad}</span></td>
            <td><span class="badge badge-cat">${p.categoria}</span></td>
            <td class="precio-col">$${Number(p.precio).toLocaleString('es-CO')} ${p.oferta ? '<br><span class="badge badge-oferta">Oferta: ' + p.oferta + '</span>' : ''}</td>
            <td>
              <div class="acciones">
                <button class="btn-edit" onclick="editarProducto('${p.id}')">Editar</button>
                <button class="btn-delete" onclick="eliminarProducto('${p.id}')">Eliminar</button>
              </div>
            </td>
          </tr>
        `).join('');
    }

    // ═══════════════════════════════════════════════════════════════════
    //  MODALES
    // ═══════════════════════════════════════════════════════════════════

    function cerrarModal(id) {
      document.getElementById(id).classList.remove('active');
    }

    function abrirModal(id) {
      document.getElementById(id).classList.add('active');
    }

    // Cerrar modal al hacer clic fuera
    document.querySelectorAll('.modal-overlay').forEach(el => {
      el.addEventListener('click', function(e) {
        if (e.target === this) this.classList.remove('active');
      });
    });

    // ═══════════════════════════════════════════════════════════════════
    //  CRUD PRODUCTOS
    // ═══════════════════════════════════════════════════════════════════

    function abrirFormProducto(id) {
      const sesion = getSesion();
      if (!sesion) return;

      document.getElementById('prodId').value = id || '';

      if (id) {
        const p = getProductos().find(x => x.id === id);
        if (!p) { toast('Producto no encontrado', 'error'); return; }
        document.getElementById('modalProductoTitulo').textContent = 'Editar producto';
        document.getElementById('prodNombre').value = p.nombre;
        document.getElementById('prodCategoria').value = p.categoria;
        document.getElementById('prodPrecio').value = p.precioBase || p.precio;
        document.getElementById('prodUnidad').value = p.unidad;
        document.getElementById('prodEmoji').value = p.emoji || '';
      } else {
        document.getElementById('modalProductoTitulo').textContent = 'Agregar producto';
        document.getElementById('prodNombre').value = '';
        document.getElementById('prodPrecio').value = '';
        document.getElementById('prodUnidad').value = 'kg';
        document.getElementById('prodEmoji').value = '';
      }

      abrirModal('modalProducto');
    }

    function editarProducto(id) { abrirFormProducto(id); }

    function guardarProducto() {
      const sesion = getSesion();
      if (!sesion) return;

      const id = document.getElementById('prodId').value;
      const nombre = document.getElementById('prodNombre').value.trim();
      const categoria = document.getElementById('prodCategoria').value;
      const precio = parseFloat(document.getElementById('prodPrecio').value);
      const unidad = document.getElementById('prodUnidad').value;
      const emoji = document.getElementById('prodEmoji').value.trim() || '📦';

      if (!nombre || !precio || precio <= 0) {
        toast('Completa nombre y precio correctamente', 'error');
        return;
      }

      let productos = getProductos();
      const ahora = new Date().toISOString();

      if (id) {
        productos = productos.map(p => p.id === id ? { ...p, nombre, categoria, precio, precioBase: precio, unidad, emoji,
            fecha: ahora } : p);
        toast('Producto actualizado', 'success');
      } else {
        productos.push({
          id: 'p_' + Date.now(),
          nombre,
          categoria,
          precio,
          precioBase: precio,
          unidad,
          emoji,
          mercadoId: sesion.mercadoId,
          oferta: null,
          fecha: ahora,
          activo: true,
          historial: [precio, precio, precio, precio]
        });
        toast('Producto agregado', 'success');
      }

      guardarProductos(productos);
      cerrarModal('modalProducto');
      renderTabla();
    }

    function eliminarProducto(id) {
      if (!confirm('¿Eliminar este producto de tu catálogo?')) return;
      let productos = getProductos();
      productos = productos.map(p => p.id === id ? { ...p, activo: false } : p);
      guardarProductos(productos);
      toast('Producto eliminado', 'warning');
      renderTabla();
    }

    // ═══════════════════════════════════════════════════════════════════
    //  OFERTAS
    // ═══════════════════════════════════════════════════════════════════

    function abrirFormOferta() {
      const sesion = getSesion();
      if (!sesion) return;

      const productos = getProductos().filter(p => p.mercadoId === sesion.mercadoId);
      if (productos.length === 0) {
        toast('No tienes productos para poner en oferta', 'error');
        return;
      }

      const select = document.getElementById('ofertaProducto');
      select.innerHTML = '';
      productos.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = p.nombre + ' (base: $' + Number(p.precioBase || p.precio).toLocaleString('es-CO') + ')';
        select.appendChild(opt);
      });

      document.getElementById('ofertaPrecio').value = '';
      document.getElementById('ofertaDesc').value = '';
      abrirModal('modalOferta');
    }

    function guardarOferta() {
      const sesion = getSesion();
      if (!sesion) return;

      const prodId = document.getElementById('ofertaProducto').value;
      const precioOferta = parseFloat(document.getElementById('ofertaPrecio').value);
      const desc = document.getElementById('ofertaDesc').value.trim();

      if (!prodId || !precioOferta || precioOferta <= 0 || !desc) {
        toast('Completa todos los campos', 'error');
        return;
      }

      let productos = getProductos();
      const prod = productos.find(p => p.id === prodId);
      if (!prod) { toast('Producto no encontrado', 'error'); return; }

      const precioBase = prod.precioBase || prod.precio;
      if (precioOferta >= precioBase) {
        toast('El precio de oferta debe ser menor al precio base ($' + Number(precioBase).toLocaleString('es-CO') + ')',
          'error');
        return;
      }

      productos = productos.map(p => p.id === prodId ? { ...p, precio: precioOferta, oferta: desc, fecha: new Date()
          .toISOString() } : p);
      guardarProductos(productos);
      toast('Oferta creada', 'success');
      cerrarModal('modalOferta');
      renderTabla();
    }

    // ═══════════════════════════════════════════════════════════════════
    //  VERIFICAR SESIÓN
    // ═══════════════════════════════════════════════════════════════════

    function verificarSesion() {
      const sesion = getSesion();
      if (sesion) {
        mostrarPanel();
      }
    }

    // ═══════════════════════════════════════════════════════════════════
    //  INICIO
    // ═══════════════════════════════════════════════════════════════════

    // Crear usuarios de prueba si no existen
    function crearUsuariosPrueba() {
      const usuarios = getUsuarios();
      if (usuarios.length === 0) {
        const mercados = getMercados();

        if (mercados.length >= 2) {
          usuarios.push({
            id: 'u1',
            nombre: 'Carlos Pérez',
            email: 'carlos@mercado.com',
            password: '123456',
            mercadoId: mercados[0].id
          });
          usuarios.push({
            id: 'u2',
            nombre: 'María Gómez',
            email: 'maria@placita.com',
            password: '123456',
            mercadoId: mercados[1].id
          });
          guardarUsuarios(usuarios);
        }
      }
    }

    // Inicializar datos si es necesario
    if (!localStorage.getItem('mapp_init')) {
      // Los datos se inicializan en index.html, pero por si acaso
      const mercados = [
        { id: 'm1', nombre: 'Mercado Central', direccion: 'Calle 10 # 5-23' },
        { id: 'm2', nombre: 'La Placita Verde', direccion: 'Av. 15 # 8-40' },
        { id: 'm3', nombre: 'Mercado Norte', direccion: 'Cra. 20 # 3-10' },

      localStorage.setItem('mapp_init', '1');

    crearUsuariosPrueba();
    verificarSesion();

    console.log('✦ Panel de mercader — Estilo pastel moderno');
    console.log('✦ Usuarios de prueba: carlos@mercado.com / 123456');
    console.log('✦ Usuarios de prueba: maria@placita.com / 123456');
  </script>
